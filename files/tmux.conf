# プレフィックスを Ctrl + j に変更
unbind C-b
set-option -g prefix C-j
bind C-j send-prefix

set -g mouse on  # マウス操作を有効化

# ウィンドウの作成と終了
bind C-t new-window  # 新しいウィンドウ (Ctrl + T)
unbind C-x

# ウィンドウ移動
bind C-k select-window -t :-
bind C-l select-window -t :+

# ペイン分割
bind C-n split-window -h  # 横分割 (Ctrl + T)

# ペイン移動
bind C-o select-pane -t :.+
bind C-r rotate-window

# 一時的にペインを最大化
bind C-j resize-pane -Z

# viモード（任意だけど便利）
set-option -g mode-keys vi

# コピーモード
bind C-f copy-mode

# ステータスバーの色設定（環境変数で制御）
# bashrcに以下を追加して色を変更:
#   export TMUX_BG_COLOR=cyan
#   export TMUX_FG_COLOR=black
#   [ -n "$TMUX" ] && tmux setenv -g TMUX_BG_COLOR "$TMUX_BG_COLOR" && tmux setenv -g TMUX_FG_COLOR "$TMUX_FG_COLOR"
if-shell '[ -n "$TMUX_BG_COLOR" ]' \
  'run-shell "tmux set -g status-style bg=$TMUX_BG_COLOR"'
if-shell '[ -n "$TMUX_FG_COLOR" ]' \
  'run-shell "tmux set -ga status-style fg=$TMUX_FG_COLOR"'


