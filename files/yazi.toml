[manager]
sort_by = "natural"
show_hidden = true
ratio = [1, 3, 4]

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [
	{ run = 'nvim "$@"', block = true, for = "unix" },
	{ run = "%EDITOR% %*",  block = true, for = "windows" },
]
imgcat = [
  { run = 'wezterm imgcat --height 90% --hold "$@"', block = true, for = "unix" },
]
svgcat = [
  { run = 'rsvg-convert -d 180 -p 180 "$@" | wezterm imgcat --height 90% --hold', block = true, for = "unix" },
]

[open]
prepend_rules = [
	{ url = "*.png", use = "imgcat" },
	{ url = "*.jpg", use = "imgcat" },
  { url = "*.jpeg", use = "imgcat" },
  { url = "*.gif", use = "imgcat" },
  { url = "*.webp", use = "imgcat" },
  { url = "*.svg", use = "svgcat" },
  { url = "*.pdf", use = "imgcat" },
  { url = "*.tif", use = "imgcat" },
  { url = "*.tiff", use = "imgcat" },
]
